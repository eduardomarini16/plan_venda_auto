<!DOCTYPE html>
<html>

<head>
    <title>Novo Contato</title>
</head>

<body>

    <h1>Novo Contato</h1>

    <form action="/novo" method="POST">

        <input name="provedor" placeholder="Provedor" required><br><br>
        <input name="cidade" placeholder="Cidade"><br><br>
        <input name="estado" placeholder="Estado"><br><br>
        <input name="telefone" placeholder="Telefone" required><br><br>
        <input name="contato" placeholder="Nome do contato"><br><br>
        <input name="data" placeholder="Data"><br><br>
        <input name="produto" placeholder="Produto"><br><br>
        <input name="observacao" placeholder="Observação"><br><br>

        <button type="submit">Salvar</button>

    </form>

    <br>

    <a href="/">
        <button>Voltar</button>
    </a>

</body>

</html>
